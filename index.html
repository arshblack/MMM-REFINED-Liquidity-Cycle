<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GSM</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10151f;
        color: #f7f9fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at 20% 20%, rgba(78, 205, 196, 0.22), transparent 28rem),
          radial-gradient(circle at 80% 30%, rgba(255, 209, 102, 0.18), transparent 24rem),
          #10151f;
      }

      main {
        width: min(100%, 720px);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(3rem, 12vw, 8rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      p {
        max-width: 36rem;
        margin: 0;
        color: #cbd5e1;
        font-size: 1.125rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GSM</h1>
      <p>This GitHub Pages site is ready. Replace this file with the latest design whenever you have a new version.</p>
    </main>
  </body>
</html>
